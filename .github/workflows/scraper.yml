name: BCBS Prefix Scraper

on:
  # Quarterly schedule — 1st day of Jan, Apr, Jul, Oct at 6am UTC
  schedule:
    - cron: '0 6 1 1,4,7,10 *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (20 prefixes only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Puppeteer browser
        working-directory: scraper
        run: npx puppeteer browsers install chrome

      - name: Run scraper (test mode)
        if: github.event.inputs.test_mode == 'true'
        working-directory: scraper
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scrape.js --test

      - name: Run scraper (full mode)
        if: github.event.inputs.test_mode != 'true'
        working-directory: scraper
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scrape.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper/*.log
          retention-days: 7
